<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Haeundae Weather Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
      <link rel="stylesheet" href="style.css">
  </head>
  <body>
      <div id="bg-overlay"></div>
      <main class="container">
          <header class="header">
              <div class="location">
                  <i data-lucide="map-pin"></i>
                  <h1>Haeundae-gu, Busan</h1>
              </div>
              <div class="time-display" id="current-time">00:00:00</div>
          </header>
          <section class="weather-main" id="weather-main">
              <div class="glass-card main-card">
                  <div class="weather-icon-large" id="main-icon">
                      <i data-lucide="sun" size="80"></i>
                  </div>
                  <div class="temp-display">
                      <span id="current-temp">--</span><span class="unit">C</span>
                  </div>
                  <div class="weather-desc" id="weather-desc">Loading...</div>
                  <div class="min-max">
                      <span id="temp-max">--</span> / <span id="temp-min">--</span>
                  </div>
              </div>
          </section>
          <section class="hourly-container">
              <h2 class="section-title">Hourly Forecast</h2>
              <div class="hourly-list" id="hourly-list"></div>
          </section>
          <section class="weather-details">
              <div class="glass-card detail-card"><i data-lucide="droplets"></i><div class="detail-info"><span class="label">Humidity</span><span class="value" id="humidity">--%</span></div></div>
              <div class="glass-card detail-card"><i data-lucide="wind"></i><div class="detail-info"><span class="label">Wind</span><span class="value" id="wind-speed">-- km/h</span></div></div>
          </section>
          <footer class="footer">
              <p>Data by Open-Meteo</p>
          </footer>
      </main>
      <script src="main.js"></script>
  </body>
  </html>
